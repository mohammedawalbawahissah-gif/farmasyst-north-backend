services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: farmasyst-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn farmasyst_north.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DATABASE_URL
        fromDatabase:
          name: farmasyst-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://farmasyst-north-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://farmasyst-north-frontend.onrender.com,https://farmasyst-backend.onrender.com"

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: farmasyst-north-frontend
    runtime: node
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://farmasyst-backend.onrender.com"
      - key: NODE_VERSION
        value: "20"

databases:
  - name: farmasyst-db
    plan: free
